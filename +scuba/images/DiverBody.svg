<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Diver silhouette - side profile in swimming position -->
  <!-- Head with mask -->
  <circle cx="38" cy="18" r="5" fill="none" stroke="#333" stroke-width="1.8"/>
  <path d="M36,16 L42,16 L42,19 L36,19 Z" fill="none" stroke="#06c" stroke-width="1.2"/>
  <!-- Torso -->
  <path d="M33,20 C30,22 22,23 18,23 C16,23 14,22 13,21" fill="none" stroke="#333" stroke-width="2.2"/>
  <!-- Tank on back -->
  <rect x="24" y="17" width="4" height="10" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Regulator hose -->
  <path d="M26,17 C30,14 35,15 37,17" fill="none" stroke="#555" stroke-width="1"/>
  <!-- Arms -->
  <path d="M30,23 L28,28 L24,30" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs with fins -->
  <path d="M16,22 L12,26 L6,28" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M16,24 L12,28 L6,31" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Fins -->
  <path d="M6,28 L2,26 L2,30 Z" fill="none" stroke="#06c" stroke-width="1.2"/>
  <path d="M6,31 L2,29 L2,33 Z" fill="none" stroke="#06c" stroke-width="1.2"/>
  <!-- Bubbles -->
  <circle cx="42" cy="12" r="1.2" fill="none" stroke="#06c" stroke-width="0.8"/>
  <circle cx="44" cy="8" r="0.9" fill="none" stroke="#06c" stroke-width="0.8"/>
  <circle cx="43" cy="5" r="0.6" fill="none" stroke="#06c" stroke-width="0.8"/>
  <!-- Water hint - subtle wave at top -->
  <path d="M0,2 C5,1 10,3 15,2 C20,1 25,3 30,2 C35,1 40,3 45,2 C48,1 50,2 50,2" fill="none" stroke="#06c" stroke-width="0.8" opacity="0.5"/>
</svg>
