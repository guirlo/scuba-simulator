<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Depth gauge / pressure sensor -->
  <circle cx="25" cy="25" r="14" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Gauge needle -->
  <line x1="25" y1="25" x2="33" y2="17" stroke="#333" stroke-width="2"/>
  <!-- Water surface waves -->
  <path d="M8,8 C11,6 14,10 17,8 C20,6 23,10 25,8" fill="none" stroke="#06c" stroke-width="1.5"/>
  <!-- Depth arrow -->
  <line x1="42" y1="10" x2="42" y2="44" stroke="#333" stroke-width="1.5"/>
  <polygon points="40,42 42,46 44,42" fill="#333"/>
</svg>
