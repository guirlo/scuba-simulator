<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- High-pressure cylinder/bottle -->
  <rect x="15" y="12" width="20" height="30" rx="10" ry="10" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Valve/neck -->
  <rect x="21" y="6" width="8" height="8" rx="2" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Pressure gauge indicator -->
  <line x1="25" y1="6" x2="25" y2="3" stroke="#333" stroke-width="1.5"/>
  <circle cx="25" cy="2" r="1" fill="#333"/>
</svg>
