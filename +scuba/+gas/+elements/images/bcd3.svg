<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" fill="white"/>

  <!-- Rounded BCD Body -->
  <path d="
    M30 30
    C30 20, 70 20, 70 30
    C80 40, 75 65, 60 78
    C55 82, 45 82, 40 78
    C25 65, 20 40, 30 30
    Z"
    fill="none" stroke="black" stroke-width="2"/>

  <!-- Neck opening (slightly larger and smoother) -->
  <ellipse cx="50" cy="30" rx="8" ry="6"
           fill="none" stroke="black" stroke-width="2"/>

  <!-- Inflator hose (smoother curve) -->
  <path d="
    M58 25
    C65 15, 80 20, 75 35
    L75 45"
    fill="none" stroke="black" stroke-width="2"/>

  <!-- Inflator button -->
  <rect x="71" y="45" width="8" height="6"
        fill="white" stroke="black" stroke-width="2"/>

  <!-- Curved front strap -->
  <path d="
    M40 55
    C50 58, 50 58, 60 55"
    fill="none" stroke="black" stroke-width="2"/>

  <!-- Rounded buckle -->
  <rect x="47" y="53" width="6" height="6" rx="1"
        fill="white" stroke="black" stroke-width="2"/>

</svg>