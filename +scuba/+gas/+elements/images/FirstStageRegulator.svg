<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Regulator body - diaphragm housing -->
  <circle cx="25" cy="25" r="14" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Diaphragm line -->
  <line x1="11" y1="25" x2="39" y2="25" stroke="#333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Spring above diaphragm -->
  <polyline points="22,13 25,15 28,13 25,11 22,13" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- HP arrow in -->
  <line x1="2" y1="25" x2="11" y2="25" stroke="#333" stroke-width="2"/>
  <polygon points="9,22 11,25 9,28" fill="#333"/>
  <!-- IP arrow out -->
  <line x1="39" y1="25" x2="48" y2="25" stroke="#333" stroke-width="2"/>
  <polygon points="46,22 48,25 46,28" fill="#333"/>
</svg>
